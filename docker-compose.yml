services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      # Leave empty to run in deterministic mock mode (no key required).
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PORT=4000
      - GEMINI_CHAT_MODEL=${GEMINI_CHAT_MODEL:-gemini-2.0-flash}
      - GEMINI_EMBED_MODEL=${GEMINI_EMBED_MODEL:-gemini-embedding-001}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # Inlined into the client bundle at build time; the browser uses this
        # to reach the backend on the host.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
